<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Garden Coin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #FF9800;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #f0f4f8);
            color: var(--tg-theme-text-color, #000000);
            overflow: hidden; /* Убираем скролл */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- ФОНЫ (Меняются каждые 10к) --- */
        .garden-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(to bottom, #8BC34A, #CDDC39); /* День */
            transition: background 1s, filter 1s;
        }
        
        body.level-10 .garden-bg { background: radial-gradient(circle, #2c3e50, #000); filter: brightness(0.6); } /* Ночь */
        body.level-20 .garden-bg { background: linear-gradient(45deg, #ff9a9e, #fad0c4); } /* Закат */

        /* --- ИНТЕРФЕЙС --- */
        .ui-layer {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        #score-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        .stat-item h3 { margin: 0; font-size: 0.9rem; color: #555; }
        .stat-item span { font-weight: bold; }

        /* --- КНОПКА (ОВОЩ) --- */
        #click-btn {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
            
            /* Картинка овоща */
            background-image: url('https://cdn-icons-png.flaticon.com/512/3161/3161178.png'); 
            background-size: cover;
            background-position: center;
        }

        body.level-10 #click-btn { 
            /* Тыква ночью */
            background-image: url('https://cdn-icons-png.flaticon.com/512/523/523441.png'); 
        }
        body.level-20 #click-btn { 
            /* Арбуз на закате */
            background-image: url('https://cdn-icons-png.flaticon.com/512/2639/2639194.png'); 
        }

        #click-btn:active { transform: scale(0.92); }

        /* Анимация всплывающих цифр */
        .floating-number {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 2rem;
            pointer-events: none;
            animation: floatUp 1s forwards;
            text-shadow: 0 2px 2px rgba(0,0,0,0.5);
            z-index: 10;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(0.5); opacity: 0; }
        }
